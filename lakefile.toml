name = "StrataCLI"
version = "0.1.0"
defaultTargets = ["StrataMainLib", "strata"]

[[require]]
name = "Strata"
git = "https://github.com/strata-org/Strata"

[[require]]
name = "StrataPython"
git = { url = "https://github.com/strata-org/Strata", subDir = "StrataPython" }

[[lean_lib]]
name = "StrataMainLib"

[[lean_exe]]
name = "strata"
root = "StrataMain"
