name: Deploy API Documentation

on:
  push:
    branches: [main]

jobs:
  deploy_doc:
    name: Deploy documentation
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Restore lake cache
        uses: strata-org/Strata/.github/actions/restore-lake-cache@main
      - name: Build API documentation package
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: 'docs/api'
          auto-config: false
          build: true
          build-args: "StrataCLI:docs"
      - name: Create documentation index
        run: |
          cp index.html _out/
          cp strata_logo.png _out/
        working-directory: docs/api
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/api/_out
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
