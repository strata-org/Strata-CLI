name: Build

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

jobs:
  get-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        shell: bash
        # The workflow is triggered by pull_request so we use `GITHUB_BASE_REF`
        run: echo "branch_name=${GITHUB_BASE_REF}" >> $GITHUB_OUTPUT
        id: get_branch_name
    outputs:
      branch_name: ${{ steps.get_branch_name.outputs.branch_name }}

  build_and_test_lean:
    name: Build and test Lean
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install cvc5
        uses: strata-org/Strata/.github/actions/install-cvc5@main
      - name: Install z3
        uses: strata-org/Strata/.github/actions/install-z3@main
      - name: Restore lake cache
        ## Only use the caches on PRs because there is a risk of stale results:
        ## https://github.com/strata-org/Strata/issues/952
        if: github.event_name == 'pull_request'
        uses: strata-org/Strata/.github/actions/restore-lake-cache@main
        with:
          path: |
            .lake
            StrataCLI/.lake
            StrataPython/.lake
      - name: Build and test
        uses: leanprover/lean-action@v1
        with:
          use-github-cache: false
          test: false
      - name: Test basic CLI usage
        run: ./scripts/testStrataCommand.sh
      - name: Validate examples against expected output
        shell: bash
        run: ./scripts/run_examples.sh
      - name: Save lake cache
        ## Only use the caches on PRs because there is a risk of stale results:
        ## https://github.com/strata-org/Strata/issues/952
        if: github.event_name == 'pull_request'
        uses: strata-org/Strata/.github/actions/save-lake-cache@main

  lint_checks:
    name: Run lint checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        toolchain:
          - stable
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required by check-no-panic (needs git history)
      - uses: strata-org/Strata/.github/actions/check-copyright-headers@main
      - uses: strata-org/Strata/.github/actions/lint-whitespace@main
        with:
          directory: .
      - uses: strata-org/Strata/.github/actions/check-lean-import@main
      - uses: strata-org/Strata/.github/actions/check-no-panic@main
        with:
          base-ref: "origin/main"

  build_doc:
    name: Build documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
      - name: Restore lake cache
        uses: strata-org/Strata/.github/actions/restore-lake-cache@main
      - name: Build API documentation package
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: 'docs/api'
          auto-config: false
          build: true
          build-args: "StrataCLI:docs"
